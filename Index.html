<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Songs App</title>
</head>
<div id="Hero">
<body>

<div id="leftContainer">
    <div id="Hamburger">☰</div>
    <div id="Logo"><img src="https://music.youtube.com/img/on_platform_logo_dark.svg"></div>
    <div id="TextBox">
        <img src="icons8-home-24.png" width="20px" id="HomeIcon">
        <div id="HomeText">Home</div>
        <img src="icons8-explore-24.png" id="ExploreIcon">
        <div id="ExploreText">Explore</div>
        <img src="icons8-bookmark-24.png" id="LibraryIcon">
        <div id="LibraryText">Library</div>
    </div>
    <div id="divider"></div>
    <div id="SignIn">Sign in</div>
</div>
<div id="cast"><img src="https://img.icons8.com/?size=100&id=Mj7jh-Xtj9Ru&format=png&color=FFFFFF" width="32px"></div>
<div id="SearchBar">
    <input id="input" autocomplete="off" aria-autocomplete="list" aria-controls="suggestion-list"
        aria-owns="suggestion-list" dir="auto" role="combobox" class="style-scope ytmusic-search-box"
        placeholder="Search songs, albums, artists, podcasts" aria-haspopup="listbox">
</div>
<div id="content">
    <div id="subTitle">THE MOST AWAITED STORM HAS ARRIVED <img src="https://em-content.zobj.net/source/apple/114/fire_1f525.png" width="18px"></div>
    <div id="sub2">'Dhurandhar The Revenge' is here <img src="https://em-content.zobj.net/source/apple/354/skull_1f480.png" width="32px"></div>
    <button id="Next">&gt;</button>
    <button id="Previous">&lt;</button>
    <div id="Shelf">
        <div class="songsRow">
            <div class="songCard">
        <div class="songImg"><img class="songImg"src=></div>
        <div class="songTitle"></div>
        <div class="songArtist"></div>
            </div>
        </div>
    </div>
    </div>
    <div id="subTitle2">Karan Aujla <img src="https://em-content.zobj.net/source/apple/81/crown_1f451.png"width="32px"></div>
    <button id="Next2">&gt;</button>
    <button id="Previous2">&lt;</button>
    <div id="Shelf2">
        <div class="songsRow2">
            <div class="songCard2">
            <div class="songImg2"><img src></div>
            <div class="songTitle2"></div>
            <div class="songArtist2"></div>
            </div>
        </div>
    </div>
    <div id="subTitle3">Albums for you <img src="https://em-content.zobj.net/source/apple/81/heavy-black-heart_2764.png" width="32px"></div>
     <button id="Next3">&gt;</button>
    <button id="Previous3">&lt;</button>
    <div id="Shelf3">
        <div class="songsRow3">
            <div class="songCard3">
            <div class="songImg3"><img src></div>
            <div class="songTitle3"></div>
            <div class="songArtist3"></div>
            </div>
        </div>
    </div>

</div>
</div>
<div class="player-bar">
    <div class="player-controls">
        <div id="prev-btn"><img src="icons8-forward-30.png" width="32px"></div>
        <div id="play-btn"><img src="https://img.icons8.com/?size=100&id=59862&format=png&color=FFFFFF" width="50px"></div>
        <div id="next-btn"><img src="https://img.icons8.com/?size=100&id=91474&format=png&color=FFFFFF" width="32px"></div>
    </div>
    <div class="now-playing">
        <img src="" width="50px" id="current-art">
        <div class="song-info">
            <h4 id="current-title"></h4>
            <p id="current-artist"></p>
        </div>
    </div>
    
</div>



<script src="Songs.js"></script>
</body>

</html>
